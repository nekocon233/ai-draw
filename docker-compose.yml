# ai-draw 生产/SSH 部署 Compose 配置
# 用于 DOCKER_HOST=ssh://nekocon-server 的远程 Docker Engine 部署。
# 注意：这里不能使用本机路径 bind mount，否则远程 Docker 会收到 Windows 路径并启动失败。

services:
  # ============================================
  # ai-draw 后端服务
  # ============================================
  ai-draw-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-draw-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:?SERVER_PORT is required}:${SERVER_PORT:?SERVER_PORT is required}"
    volumes:
      # 前端构建产物共享给 Nginx；部署前会删除该卷以刷新静态资源
      - frontend-dist:/app/frontend/dist
      # 用户上传文件和生成图片持久化存储
      - uploads-data:/app/uploads
      # 持久化 Hugging Face 权重，避免每次部署后重新下载 ToonOut/BiRefNet
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_PORT=${SERVER_PORT:?SERVER_PORT is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    env_file:
      - .env
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${SERVER_PORT}/api/service/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
    command: python run.py

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-draw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:?DB_PORT is required}:5432"

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: ai-draw-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:?FRONTEND_HTTP_PORT is required}:80"
      - "${FRONTEND_HTTPS_PORT:?FRONTEND_HTTPS_PORT is required}:443"
    environment:
      - BACKEND_PORT=${SERVER_PORT:?SERVER_PORT is required}
    volumes:
      # 从后端镜像初始化出来的前端构建产物
      - frontend-dist:/usr/share/nginx/html:ro
      # 共享上传文件给 Nginx 静态文件服务
      - uploads-data:/usr/share/nginx/uploads:ro
    networks:
      - ai-draw-network
    depends_on:
      - ai-draw-backend

# ============================================
# 网络配置
# ============================================
networks:
  ai-draw-network:
    driver: bridge

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  uploads-data:
    driver: local
  huggingface-cache:
    driver: local
  frontend-dist:
    driver: local
