# AI-Draw 生产/SSH 部署 Compose 配置
# 用于 DOCKER_HOST=ssh://nekocon-server 的远程 Docker Engine 部署。
# 注意：这里不能使用本机路径 bind mount，否则远程 Docker 会收到 Windows 路径并启动失败。

services:
  # ============================================
  # AI-Draw 后端服务
  # ============================================
  ai-draw-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-draw-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-14600}:${SERVER_PORT:-14600}"
    volumes:
      # 前端构建产物共享给 Nginx；部署前会删除该卷以刷新静态资源
      - frontend-dist:/app/frontend/dist
      # 用户上传文件和生成图片持久化存储
      - uploads-data:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      # 应用配置
      - APP_NAME=ai-draw
      - APP_DEBUG=true
      - APP_VERSION=1.0.0
      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=14600
      - SERVER_RELOAD=false
      - CORS_ORIGINS=["http://localhost:5173","http://127.0.0.1:5173","http://localhost:14601","${PRODUCTION_DOMAIN}"]
      # 前端端口
      - FRONTEND_HTTP_PORT=14601
      - FRONTEND_HTTPS_PORT=14602
      # ComfyUI 配置
      - COMFYUI_ENABLED=true
      - COMFYUI_HOST=comfyui
      - COMFYUI_PORT=8188
      - COMFYUI_PATH=
      - COMFYUI_PYTHON=
      - COMFYUI_TIMEOUT=30
      - COMFYUI_CHECK_INTERVAL=5000
      - COMFYUI_CLOUD_ENABLED=false
      - COMFYUI_CLOUD_API_URL=
      # AI Prompt 配置
      - AI_PROMPT_PROVIDER=openai
      - AI_PROMPT_BASE_URL=http://copilot-api-copilot-api-1:4141/v1
      - AI_PROMPT_MODEL=gpt-4o
      - AI_PROMPT_TEMPLATE=你是一个Stable Diffusion提示词专家，请将以下自然语言描述转换为SD提示词（英文标签，用逗号分隔，不要增加额外的描述）：\n描述：{desc}\n只输出提示词，不要解释：
      # 认证配置
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=10080
      - INVITE_CODE=${INVITE_CODE}
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ai_draw
      - DB_USER=ai_draw
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # 路径配置
      - WORKFLOWS_PATH=configs/workflows
    env_file:
      - .env
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SERVER_PORT:-14600}/api/service/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
    command: python run.py

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-draw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai_draw}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ai_draw}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_draw}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: ai-draw-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-14601}:80"
      - "${FRONTEND_HTTPS_PORT:-14602}:443"
    environment:
      - BACKEND_PORT=${SERVER_PORT:-14600}
    volumes:
      # 从后端镜像初始化出来的前端构建产物
      - frontend-dist:/usr/share/nginx/html:ro
      # 共享上传文件给 Nginx 静态文件服务
      - uploads-data:/usr/share/nginx/uploads:ro
    networks:
      - ai-draw-network
    depends_on:
      - ai-draw-backend

# ============================================
# 网络配置
# ============================================
networks:
  ai-draw-network:
    driver: bridge

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  uploads-data:
    driver: local
  frontend-dist:
    driver: local
