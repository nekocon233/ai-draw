# ai-draw 部署 Compose 配置
# 通过 DOCKER_HOST=ssh://nekocon-server 部署到 Docker Engine。
# 在本机开发时，~/.ssh/config 中 nekocon-server 指向 127.0.0.1，即部署到本机 Docker Engine。

services:
  # ============================================
  # ai-draw 后端服务
  # ============================================
  ai-draw-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-draw-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:?SERVER_PORT is required}:${SERVER_PORT:?SERVER_PORT is required}"
    volumes:
      # 前端构建产物共享给 Caddy；部署前会删除该卷以刷新静态资源
      - frontend-dist:/app/frontend/dist
      # 用户上传文件和生成图片持久化存储
      - uploads-data:/app/uploads
      # 持久化 Hugging Face 权重，避免每次部署后重新下载 ToonOut/BiRefNet
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_PORT=${SERVER_PORT:?SERVER_PORT is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
    env_file:
      - .env
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${SERVER_PORT}/api/service/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - postgres
    command: python run.py

  # ============================================
  # PostgreSQL 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: ai-draw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-draw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:?DB_PORT is required}:5432"

  # ============================================
  # Caddy 反向代理
  # ============================================
  caddy:
    image: caddy:2.11.4-alpine
    container_name: ai-draw-caddy
    restart: unless-stopped
    ports:
      # 只绑回环：HTTPS/域名由外层 frp 在云端终止，打到本机回环 14601
      - "127.0.0.1:${FRONTEND_HTTP_PORT:?FRONTEND_HTTP_PORT is required}:80"
    environment:
      - BACKEND_PORT=${SERVER_PORT:?SERVER_PORT is required}
    volumes:
      # Caddyfile 配置
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # 从后端镜像初始化出来的前端构建产物
      - frontend-dist:/srv/frontend:ro
      # 共享上传文件给 Caddy 静态文件服务
      - uploads-data:/srv/uploads:ro
    networks:
      - ai-draw-network
    depends_on:
      - ai-draw-backend

# ============================================
# 网络配置
# ============================================
networks:
  ai-draw-network:
    driver: bridge

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  uploads-data:
    driver: local
  huggingface-cache:
    driver: local
  frontend-dist:
    driver: local
