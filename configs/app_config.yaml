# AI-Draw 应用配置文件
# 
# 说明：
# - 所有服务配置从环境变量读取（见 .env 文件）
# - 仅保留工作流配置（复杂结构不适合环境变量）

# 工作流配置
workflow_defaults:
  # 默认工作流类型
  current_workflow_type: "通用"
  # 列数
  col_count: 4
  
  # 工作流文件名映射
  workflow_files:
    通用: "common_workflow_api.json"
    上色: "color_workflow_api.json"
    图生图: "img2img_workflow_api.json"
    线稿: "lineart_workflow_api.json"
  
  # 各工作流的默认参数
  workflows:
    通用:
      description: "一个女孩"
      prompt: "1girl"
      lora_prompt: "<lora:Ameniwa:0.6>"
      strength: 0.8
      count: 1
    上色:
      description: "一个女孩"
      prompt: "1girl"
      lora_prompt: "<lora:Ameniwa:0.6>"
      strength: 0.8
      count: 1
    图生图:
      description: "一个女孩"
      prompt: "1girl"
      lora_prompt: "<lora:Ameniwa:0.6>"
      strength: 0.8
      count: 1
    线稿:
      description: ""
      prompt: ""
      lora_prompt: ""
      strength: 0.8
      count: 1
