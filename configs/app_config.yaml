# AI-Draw 应用配置文件
# 
# 说明：
# - 所有服务配置从环境变量读取（见 .env 文件）
# - 仅保留工作流配置（复杂结构不适合环境变量）

# 工作流配置
workflow_defaults:
  # 默认工作流类型
  current_workflow_type: "t2i"
  # 列数
  col_count: 4
  
  # 工作流文件名映射
  workflow_files:
    t2i: "t2i_workflow_api.json"
    i2i: "qwen_image_edit_workflow_api.json"
    flf2v: "flf2v_workflow_api.json"
    i2v: "i2v_workflow_api.json"
  # 工作流元数据
  workflow_metadata:
    t2i:
      label: "文生图（Z-Image）"
      description: "纯文本生成图像"
      requires_image: false
      prompt_template: "你是一个 AI 图像生成提示词专家，当前使用 Z-Image（Lumina2 架构）模型，该模型擅长理解中文自然语言描述。请将以下描述扩写为详细的中文图像提示词，描述主体、外貌、服装、场景、光线、风格等细节，语言流畅自然，不要使用英文标签格式：\n描述：{desc}\n只输出提示词，不要解释："
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "lora_prompt"
          label: "LoRA 提示词"
          type: "text"
          default: "<lora:AmeniwaZ:0.8>"
    i2i:
      label: "图生图（Q-Image）"
      description: "基于参考图重绘"
      requires_image: true
      supports_original_size: true
      prompt_template: "你是一个 AI 图像编辑提示词专家，当前使用 Qwen 图像编辑模型，支持中文自然语言指令。请将以下描述转换为简洁明确的中文图像编辑指令，说明对图像做什么修改（如改变颜色、调整风格、修改内容等）：\n描述：{desc}\n只输出提示词，不要解释："
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "strength"
          label: "重绘强度"
          type: "number"
          min: 0
          max: 1
          step: 0.01
          default: 1
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "width"
          label: "图像宽度"
          type: "number"
          min: 512
          max: 2048
          step: 64
          default: 1024
        - name: "height"
          label: "图像高度"
          type: "number"
          min: 512
          max: 2048
          step: 64
          default: 1024
    nano_banana_pro:
      label: "图生图（Nano Banana Pro）"
      description: "基于 Nano Banana Pro 的图生图工作流"
      requires_image: false
      output_type: "image"
      prompt_template: "你是一个图像描述扩写专家，当前使用 Nano Banana Pro（Gemini）模型，能够理解极为丰富的中文细节描述。请将以下简短描述扩写为非常详细丰富的中文描述，涵盖人物外貌、表情、服装、姿势、场景环境、光线氛围、风格等所有细节：\n描述：{desc}\n只输出扩写后的中文描述，不要解释："
      parameters:
        - name: "prompt"
          label: "描述 / 指令"
          type: "text"
          default: "一个女孩"
    flf2v:
      label: "首尾帧生视频（Wan FLF2V）"
      description: "基于首尾帧生成过渡视频"
      requires_image: true
      requires_end_image: true
      supports_original_size: true
      supports_loop: true
      output_type: "video"
      prompt_template: "你是一个 AI 视频生成提示词专家，当前使用 Wan2.2 视频模型，基于首帧和尾帧生成过渡视频，支持中文自然语言描述。请将以下描述扩写为详细的中文视频提示词，描述画面内容、人物动作、场景变化、运镜方式、氛围风格，突出动态感和画面过渡效果：\n描述：{desc}\n只输出提示词，不要解释："
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "width"
          label: "视频宽度"
          type: "number"
          min: 256
          max: 1280
          step: 64
          default: 1024
        - name: "height"
          label: "视频高度"
          type: "number"
          min: 256
          max: 1280
          step: 64
          default: 1024
        - name: "startFrameCount"
          label: "起始帧长度"
          type: "number"
          min: 1
          max: 200
          step: 1
          default: 33
        - name: "endFrameCount"
          label: "结束帧长度"
          type: "number"
          min: 1
          max: 200
          step: 1
          default: 33
        - name: "frameRate"
          label: "帧率"
          type: "number"
          min: 1
          max: 60
          step: 1
          default: 16
    i2v:
      label: "图生视频（Wan i2v）"
      description: "基于参考图生成视频"
      requires_image: true
      supports_original_size: true
      output_type: "video"
      prompt_template: "你是一个 AI 视频生成提示词专家，当前使用 Wan2.2 i2v 视频模型，基于起始帧图像生成视频，支持中文自然语言描述。请将以下描述扩写为详细的中文视频提示词，描述画面内容、人物动作、场景变化、运镜方式、氛围风格，突出动态感：\n描述：{desc}\n只输出提示词，不要解释："
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "frameCount"
          label: "总帧数"
          type: "number"
          min: 1
          max: 200
          step: 1
          default: 33
        - name: "frameRate"
          label: "帧率"
          type: "number"
          min: 1
          max: 60
          step: 1
          default: 16
    pixel_lab_animate:
      label: "像素动画（PixelLab）"
      description: "基于参考图生成像素角色动画序列帧"
      requires_image: true
      output_type: "animation"
      prompt_template: null
      parameters:
        - name: "action"
          label: "动作"
          type: "select"
          options: ["walk", "run", "jump", "attack", "idle"]
          default: "walk"
        - name: "view"
          label: "视角"
          type: "select"
          options: ["sidescroller", "low top-down", "high top-down"]
          default: "sidescroller"
        - name: "direction"
          label: "朝向"
          type: "select"
          options: ["east", "south", "west", "north", "south-east", "north-east", "south-west", "north-west"]
          default: "east"
