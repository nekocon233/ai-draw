# AI-Draw 应用配置文件
# 
# 说明：
# - 所有服务配置从环境变量读取（见 .env 文件）
# - 仅保留工作流配置（复杂结构不适合环境变量）

# 工作流配置
workflow_defaults:
  # 默认工作流类型
  current_workflow_type: "t2i"
  # 列数
  col_count: 4
  
  # 工作流文件名映射
  workflow_files:
    t2i: "t2i_workflow_api.json"
    i2i: "qwen_image_edit_workflow_api.json"
    reference: "reference_workflow_api.json"
    reference_zimage: "reference_zimage_workflow_api.json"
    flf2v: "flf2v_workflow_api.json"
    nano_banana_pro: "nano_banana_pro_workflow_api.json"
  
  # 工作流元数据
  workflow_metadata:
    t2i:
      label: "文生图（Z-Image）"
      description: "纯文本生成图像"
      requires_image: false
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "lora_prompt"
          label: "LoRA 提示词"
          type: "text"
          default: "<lora:AmeniwaZ:0.8>"
    i2i:
      label: "图生图（Q-Image）"
      description: "基于参考图重绘"
      requires_image: true
      supports_original_size: true
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "strength"
          label: "重绘强度"
          type: "number"
          min: 0
          max: 1
          step: 0.01
          default: 1
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "width"
          label: "图像宽度"
          type: "number"
          min: 512
          max: 2048
          step: 64
          default: 1024
        - name: "height"
          label: "图像高度"
          type: "number"
          min: 512
          max: 2048
          step: 64
          default: 1024
    reference:
      label: "参考图（SDXL）"
      description: "SDXL 参考图工作流"
      requires_image: true
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "1girl"
        - name: "strength"
          label: "参考强度"
          type: "number"
          min: 0
          max: 1
          step: 0.01
          default: 0.8
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "lora_prompt"
          label: "LoRA 提示词"
          type: "text"
          default: "<lora:Ameniwa:0.8>"
    reference_zimage:
      label: "参考图（Z-Image）"
      description: "Z-Image Turbo 参考图工作流"
      requires_image: true
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "strength"
          label: "参考强度"
          type: "number"
          min: 0
          max: 1
          step: 0.01
          default: 0.8
        - name: "count"
          label: "生成数量"
          type: "number"
          min: 1
          max: 8
          step: 1
          default: 1
        - name: "lora_prompt"
          label: "LoRA 提示词"
          type: "text"
          default: "<lora:AmeniwaZ:0.8>"
    nano_banana_pro:
      label: "图生图（Nano Banana Pro）"
      description: "基于 Nano Banana Pro 的图生图工作流"
      requires_image: true
      output_type: "image"
      parameters:
        - name: "prompt"
          label: "描述 / 指令"
          type: "text"
          default: "一个女孩"
    flf2v:
      label: "首尾帧生视频"
      description: "基于首尾帧生成过渡视频"
      requires_image: true
      requires_end_image: true
      supports_original_size: true
      supports_loop: true
      output_type: "video"
      parameters:
        - name: "prompt"
          label: "提示词"
          type: "text"
          default: "一个女孩"
        - name: "width"
          label: "视频宽度"
          type: "number"
          min: 256
          max: 1280
          step: 64
          default: 1024
        - name: "height"
          label: "视频高度"
          type: "number"
          min: 256
          max: 1280
          step: 64
          default: 1024
        - name: "startFrameCount"
          label: "起始帧长度"
          type: "number"
          min: 1
          max: 200
          step: 1
          default: 33
        - name: "endFrameCount"
          label: "结束帧长度"
          type: "number"
          min: 1
          max: 200
          step: 1
          default: 33
        - name: "frameRate"
          label: "帧率"
          type: "number"
          min: 1
          max: 60
          step: 1
          default: 16
