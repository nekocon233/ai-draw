# AI-Draw 应用配置文件
# 
# 说明：
# - 所有服务配置从环境变量读取（见 .env 文件）
# - 仅保留工作流配置（复杂结构不适合环境变量）

# 工作流配置
workflow_defaults:
  # 默认工作流类型
  current_workflow_type: "t2i"
  # 列数
  col_count: 4
  
  # 工作流文件名映射
  workflow_files:
    t2i: "t2i_workflow_api.json"
    i2i: "i2i_workflow_api.json"
  
  # 各工作流的默认参数
  workflows:
    t2i:
      description: "一个女孩"
      prompt: "1girl"
      lora_prompt: "<lora:AmeniwaZ:0.8>"
      strength: 0.8
      count: 1
    i2i:
      description: "一个女孩"
      prompt: "1girl"
      lora_prompt: "<lora:AmeniwaZ:0.8>"
      strength: 0.8
      count: 1
